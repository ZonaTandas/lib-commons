# Tests en cada push (evolutivo 2026-07-revision-y-testing). El gate
# bloqueante de coverage se activará en una fase posterior; de momento el
# porcentaje es informativo.
name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Vet
        run: go vet ./...
      - name: Tests con coverage
        run: go test ./... -coverprofile=coverage.out
      - name: Coverage (informativo)
        run: go tool cover -func=coverage.out | tail -1
